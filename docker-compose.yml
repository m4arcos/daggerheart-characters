services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend/src:/app/src
      - ./backend/data:/app/data
      - ./backend/entrypoint.sh:/app/entrypoint.sh
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DB_PATH=/app/data/daggerheart.db
    command: sh /app/entrypoint.sh

  frontend:
    build: ./frontend
    ports:
      - "3002:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend
